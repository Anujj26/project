<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anuj Ahire | Social Links Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section class="card" aria-labelledby="profile-name">
      <button class="toggle-theme" id="themeToggle" type="button" aria-label="Toggle light and dark mode">
        <i class="fa-solid fa-moon"></i>
      </button>

      <header class="profile">
        <div class="avatar-frame">
          <img
            class="avatar"
            alt="Profile photo of Anuj Ahire"
            src="profile.jpg.png"
          >
        </div>
        <div>
          <h1 id="profile-name">Anuj Ahire</h1>
          <p class="location">Pune, India</p>
        </div>
        <p class="bio">Frontend Developer | MERN Stack Enthusiast 🚀 Building modern web apps &amp; dashboards</p>
      </header>

      <nav class="links" aria-label="Social profile links">
        <a class="social-link" href="https://github.com/Anujj26" target="_blank" rel="noreferrer">
          <i class="fa-brands fa-github" aria-hidden="true"></i>
          <span>GitHub</span>
        </a>
        <a class="social-link" href="https://www.linkedin.com/in/anujahire/" target="_blank" rel="noreferrer">
          <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
          <span>LinkedIn</span>
        </a>
        <a class="social-link" href="https://www.frontendmentor.io/" target="_blank" rel="noreferrer">
          <i class="fa-solid fa-code" aria-hidden="true"></i>
          <span>Frontend Mentor</span>
        </a>
        <a class="social-link" href="https://twitter.com/" target="_blank" rel="noreferrer">
          <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
          <span>Twitter</span>
        </a>
        <a class="social-link" href="https://www.instagram.com/" target="_blank" rel="noreferrer">
          <i class="fa-brands fa-instagram" aria-hidden="true"></i>
          <span>Instagram</span>
        </a>
      </nav>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
